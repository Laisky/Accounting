              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/AuditEventList",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/admin/audit:
  get:
    tags: [audit]
    summary: List global audit events for configured administrators.
    parameters:
      [
        { $ref: "../openapi.yaml#/components/parameters/Page" },
        { $ref: "../openapi.yaml#/components/parameters/PageSize" },
      ]
    responses:
      "200":
        {
          description: Global audit event list,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/AuditEventList",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/telemetry/client:
  post:
    tags: [system]
    security: []
    summary: Ingest sanitized client telemetry (errors and Web Vitals).
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../openapi.yaml#/components/schemas/ClientTelemetry" }
    responses:
      "204": { description: Telemetry accepted. }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
