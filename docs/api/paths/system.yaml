        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/passkeys/login/begin:
  post:
    tags: [auth]
    security: []
    responses:
      "200":
        {
          description: Passkey login ceremony,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/PasskeyStart",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/passkeys/login/finish:
  post:
    tags: [auth]
    security: []
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  $ref: "../openapi.yaml#/components/schemas/PasskeyFinishRequest",
                },
            },
        }
    responses:
      "200":
        {
          description: Authenticated session,
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "../openapi.yaml#/components/schemas/AuthResult" },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/sso/start:
  get:
    tags: [auth]
    security: []
    responses:
      "302": { description: Redirect to external SSO provider. }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/sso/callback:
  post:
    tags: [auth]
    security: []
    requestBody:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            required: [state, sso_token]
            properties:
              state: { type: string }
              sso_token: { type: string }
    responses:
      "302": { description: Redirect to clean app URL. }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
  get:
    tags: [auth]
    deprecated: true
    security: []
    parameters:
      - name: state
        in: query
        schema: { type: string }
      - name: sso_token
        in: query
        schema: { type: string }
    responses:
      "302": { description: Redirect to clean app URL. }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/passkeys:
  get:
    tags: [auth]
    parameters:
      [
        { $ref: "../openapi.yaml#/components/parameters/Page" },
        { $ref: "../openapi.yaml#/components/parameters/PageSize" },
      ]
    responses:
      "200":
        {
          description: Passkey list,
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "../openapi.yaml#/components/schemas/PasskeyList" },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/passkeys/register/begin:
  post:
    tags: [auth]
    responses:
      "200":
        {
          description: Passkey registration ceremony,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/PasskeyStart",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/passkeys/register/finish:
  post:
    tags: [auth]
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  $ref: "../openapi.yaml#/components/schemas/PasskeyFinishRequest",
                },
            },
        }
    responses:
      "200":
        {
          description: Stored passkey,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/PasskeyListItem",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/passkeys/{id}:
  put:
    tags: [auth]
    parameters: [{ $ref: "../openapi.yaml#/components/parameters/PasskeyID" }]
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  $ref: "../openapi.yaml#/components/schemas/PasskeyUpdateRequest",
                },
            },
        }
    responses:
      "200":
        {
          description: Updated passkey,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/PasskeyListItem",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
  delete:
    tags: [auth]
    parameters: [{ $ref: "../openapi.yaml#/components/parameters/PasskeyID" }]
    responses:
      "200":
        {
          description: Passkey deleted,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/StatusResponse",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/users/me:
  get:
    tags: [users]
    responses:
      "200":
        {
          description: Current user profile,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/UserEnvelope",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
  patch:
    tags: [users]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              baseCurrency: { type: string }
    responses:
      "200":
        {
          description: Updated profile,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/UserEnvelope",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/audit:
  get:
    tags: [audit]
    parameters:
      [
        { $ref: "../openapi.yaml#/components/parameters/Page" },
        { $ref: "../openapi.yaml#/components/parameters/PageSize" },
      ]
