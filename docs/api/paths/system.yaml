/health:
  get:
    tags: [system]
    security: []
    responses:
      "200": { description: Healthy response }
/runtime-config:
  get:
    tags: [system]
    security: []
    responses:
      "200":
        description: Public runtime configuration.
        content:
          application/json:
            schema:
              { $ref: "../openapi.yaml#/components/schemas/RuntimeConfig" }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/register:
  post:
    tags: [auth]
    security: []
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  $ref: "../openapi.yaml#/components/schemas/PasswordCredentials",
                },
            },
        }
    responses:
      "201":
        {
          description: Registered user,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/UserEnvelope",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/login:
  post:
    tags: [auth]
    security: []
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  $ref: "../openapi.yaml#/components/schemas/PasswordCredentials",
                },
            },
        }
    responses:
      "200":
        {
          description: Login result,
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "../openapi.yaml#/components/schemas/AuthResult" },
                },
            },
        }
      "429":
        {
          description: Login temporarily locked or auth rate limit exceeded,
          headers:
            {
              Retry-After:
                {
                  description: Seconds until retry is allowed when account lockout is active,
                  schema: { type: integer, minimum: 1 },
                },
            },
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "../openapi.yaml#/components/schemas/ErrorResponse" },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/logout:
  post:
    tags: [auth]
    responses:
      "200":
        {
          description: Session cleared,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/StatusResponse",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/logout-all:
  post:
    tags: [auth]
    responses:
      "200":
        {
          description: All user sessions cleared,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/StatusResponse",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/session:
  get:
    tags: [auth]
    responses:
      "200":
        {
          description: Active session,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/SessionResult",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/email/verification:
  get:
    tags: [auth]
    security: []
    parameters:
      - name: email
        in: query
        required: true
        schema: { type: string, format: email }
    responses:
      "202": { $ref: "../openapi.yaml#/components/responses/Accepted" }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
  post:
    tags: [auth]
    security: []
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  $ref: "../openapi.yaml#/components/schemas/EmailCodeRequest",
                },
            },
        }
    responses:
      "200":
        {
          description: Activated user,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/UserEnvelope",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/password-reset/request:
  post:
    tags: [auth]
    security: []
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                { $ref: "../openapi.yaml#/components/schemas/EmailRequest" },
            },
        }
    responses:
      "202": { $ref: "../openapi.yaml#/components/responses/Accepted" }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/password-reset/confirm:
  post:
    tags: [auth]
    security: []
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  $ref: "../openapi.yaml#/components/schemas/PasswordResetConfirmRequest",
                },
            },
        }
    responses:
      "200":
        {
          description: Updated user,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/UserEnvelope",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/auth/totp/status:
