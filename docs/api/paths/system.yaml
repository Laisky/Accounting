/auth/totp/disable:
  post:
    tags: [auth]
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                { $ref: "../openapi.yaml#/components/schemas/TotpCodeRequest" },
            },
        }
    responses:
      "200":
        {
          description: TOTP state,
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "../openapi.yaml#/components/schemas/TotpStatus" },
