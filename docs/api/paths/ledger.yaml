/ledger/summary:
  get:
    tags: [ledger]
    responses:
      "200":
        description: Actor ledger summary.
        content:
          application/json:
            schema:
              { $ref: "../openapi.yaml#/components/schemas/LedgerSummary" }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/exchange-rates:
  get:
    tags: [ledger]
    responses:
      "200":
        description: Supported exchange rates.
        content:
          application/json:
            schema:
              type: array
              items:
                { $ref: "../openapi.yaml#/components/schemas/ExchangeRate" }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/books:
  get:
    tags: [ledger]
    parameters:
      [
        { $ref: "../openapi.yaml#/components/parameters/Page" },
        { $ref: "../openapi.yaml#/components/parameters/PageSize" },
      ]
    responses:
      "200":
        {
          description: Book list,
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "../openapi.yaml#/components/schemas/BookList" },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
  post:
    tags: [ledger]
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  $ref: "../openapi.yaml#/components/schemas/BookCreateRequest",
                },
            },
        }
    responses:
      "201":
        {
          description: Created book,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/BookListItem",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/books/{bookID}:
  get:
    tags: [ledger]
    parameters: [{ $ref: "../openapi.yaml#/components/parameters/BookID" }]
    responses:
      "200":
        {
          description: Book settings,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/BookListItem",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
  patch:
    tags: [ledger]
    parameters: [{ $ref: "../openapi.yaml#/components/parameters/BookID" }]
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
                {
                  $ref: "../openapi.yaml#/components/schemas/BookUpdateRequest",
                },
            },
        }
    responses:
      "200":
        {
          description: Updated book,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/BookListItem",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/books/{bookID}/members:
  get:
    tags: [ledger]
    parameters:
      [
        { $ref: "../openapi.yaml#/components/parameters/BookID" },
        { $ref: "../openapi.yaml#/components/parameters/Page" },
        { $ref: "../openapi.yaml#/components/parameters/PageSize" },
      ]
    responses:
      "200":
        {
          description: Book members,
          content:
