                      $ref: "../openapi.yaml#/components/schemas/BookMemberList",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/books/{bookID}/ledger/summary:
  get:
    tags: [ledger]
    parameters:
      - { $ref: "../openapi.yaml#/components/parameters/BookID" }
      - name: start_date
        in: query
        schema: { type: string, format: date }
      - name: end_date
        in: query
        schema: { type: string, format: date }
    responses:
      "200":
        {
          description: Book ledger summary,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/LedgerSummary",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
