/imports/wacai/preview:
  post:
    tags: [imports]
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties:
              file:
                type: string
                format: binary
    responses:
      "201":
        {
          description: Staged preview,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "../openapi.yaml#/components/schemas/ImportPreviewBatch",
                    },
                },
            },
        }
      default: { $ref: "../openapi.yaml#/components/responses/Error" }
/books/{bookID}/imports/{batchID}/apply:
  post:
    tags: [imports]
    parameters:
      [
        { $ref: "../openapi.yaml#/components/parameters/BookID" },
        { $ref: "../openapi.yaml#/components/parameters/BatchID" },
      ]
    requestBody:
      required: true
      content:
        {
          application/json:
            {
              schema:
