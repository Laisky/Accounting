name: Go

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-and-cli:
    name: Backend and CLI
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: accounting
          POSTGRES_PASSWORD: accounting
          POSTGRES_DB: accounting_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U accounting -d accounting_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://accounting:accounting@localhost:5432/accounting_test?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            backend/go.sum
            cli/go.sum

      - name: Lint backend
        run: make backend-lint

      - name: Lint CLI
        run: make cli-lint

      - name: Verify generated lint edits are committed
        run: git diff --exit-code -- backend cli

      - name: Build backend and CLI
        run: |
          make backend-build
          make cli-build

      - name: Scan backend vulnerabilities
        run: make backend-vuln

      - name: Test backend and CLI
        run: |
          make backend-test
          make cli-test
