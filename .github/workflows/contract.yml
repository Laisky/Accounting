name: Contract

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  openapi:
    name: OpenAPI Generated Types
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Check generated API types
        run: pnpm --dir web run check:api
