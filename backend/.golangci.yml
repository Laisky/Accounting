version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - errcheck
    - errorlint
    - govet
    - gosec
    - ineffassign
    - misspell
    - nilerr
    - nilnil
    - noctx
    - prealloc
    - predeclared
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unparam
    - unused
    - whitespace
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - noctx
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
